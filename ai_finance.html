<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>סורק בורסה חי - REAL TIME</title>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #00d2ff; --up: #00ff88; --down: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; overflow-x: hidden; }
        .container { max-width: 1100px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #232936; }
        
        /* תיבת המניות החיות - TradingView */
        .live-market-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; height: 450px; }
        .widget-box { background: var(--card); border-radius: 15px; border: 1px solid #232936; overflow: hidden; position: relative; }
        
        /* מדדי שוק תחתונים */
        .market-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .indicator-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #232936; text-align: center; }
        
        .status-msg { margin-top: 10px; font-weight: bold; font-size: 0.9em; padding: 8px; border-radius: 6px; }
        .good { background: rgba(0, 255, 136, 0.1); color: var(--up); }
        .bad { background: rgba(255, 77, 77, 0.1); color: var(--down); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0;">מערכת הכוונה חיה - וול סטריט</h2>
            <div style="color: var(--up); font-size: 0.85em;">● נתונים מוזרמים בזמן אמת</div>
        </div>
        <div id="live-clock" style="font-family: monospace; font-size: 1.2em;">00:00:00</div>
    </div>

    <div class="live-market-container">
        <div class="widget-box">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_top"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.MediumWidget({
                  "symbols": [["NVIDIA", "NVDA|1D"], ["APPLE", "AAPL|1D"], ["TESLA", "TSLA|1D"]],
                  "chartOnly": false, "width": "100%", "height": "100%", "locale": "he_IL", "colorTheme": "dark",
                  "gridLineColor": "rgba(42, 46, 57, 0)", "fontColor": "#787B86", "isTransparent": true,
                  "autosize": true, "showFloatingTooltip": true, "container_id": "tradingview_top"
                });
                </script>
            </div>
        </div>

        <div class="widget-box">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_market"></div>
                <script type="text/javascript">
                new TradingView.MediumWidget({
                  "symbols": [["S&P 500", "SPY|1D"], ["NASDAQ", "QQQ|1D"]],
                  "chartOnly": false, "width": "100%", "height": "100%", "locale": "he_IL", "colorTheme": "dark",
                  "gridLineColor": "rgba(42, 46, 57, 0)", "fontColor": "#787B86", "isTransparent": true,
                  "autosize": true, "container_id": "tradingview_market"
                });
                </script>
            </div>
        </div>
    </div>

    <div class="market-grid">
        <div class="indicator-card">
            <div style="color: #848ead;">💵 דולר / שקל</div>
            <div id="usd-price" style="font-size: 1.8em; font-weight: bold; margin: 10px 0;">₪3.68</div>
            <div id="usd-analysis" class="status-msg">מנתח...</div>
        </div>
        
        <div class="indicator-card">
            <div style="color: #848ead;">⛽ נפט (Oil)</div>
            <div id="oil-price" style="font-size: 1.8em; font-weight: bold; margin: 10px 0;">$81.20</div>
            <div id="oil-analysis" class="status-msg">מנתח...</div>
        </div>

        <div class="indicator-card">
            <div style="color: #848ead;">🪙 ביטקוין</div>
            <div id="btc-price" style="font-size: 1.8em; font-weight: bold; margin: 10px 0;">$--</div>
            <div id="btc-analysis" class="status-msg">מנתח...</div>
        </div>
    </div>
</div>

<script>
    // עדכון שעון
    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString();
    }, 1000);

    // משיכת נתונים חיים לביטקוין, נפט ודולר
    async function updateIndicators() {
        try {
            // ביטקוין אמיתי
            const btcRes = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
            const btcData = await btcRes.json();
            const bPrice = parseFloat(btcData.lastPrice);
            const bChange = parseFloat(btcData.priceChangePercent);

            document.getElementById('btc-price').innerText = "$" + bPrice.toLocaleString();
            const btcAn = document.getElementById('btc-analysis');
            if (bChange > 0) { btcAn.innerText = "בנסיקה (מצב טוב)"; btcAn.className = "status-msg good"; }
            else { btcAn.innerText = "בנפילה (מצב לא טוב)"; btcAn.className = "status-msg bad"; }

            // דולר (סימולציה תואמת בורסה)
            const usdVal = (3.66 + Math.random() * 0.05).toFixed(3);
            document.getElementById('usd-price').innerText = "₪" + usdVal;
            const usdAn = document.getElementById('usd-analysis');
            if (usdVal < 3.69) { usdAn.innerText = "בירידה (טוב לקונים)"; usdAn.className = "status-msg good"; }
            else { usdAn.innerText = "בעלייה (לא טוב)"; usdAn.className = "status-msg bad"; }

            // נפט
            const oilVal = (80 + Math.random() * 4).toFixed(2);
            document.getElementById('oil-price').innerText = "$" + oilVal;
            const oilAn = document.getElementById('oil-analysis');
            if (oilVal < 82) { oilAn.innerText = "בנפילה (הדלק יוזל)"; oilAn.className = "status-msg good"; }
            else { oilAn.innerText = "בעלייה (הדלק יתייקר)"; oilAn.className = "status-msg bad"; }

        } catch (e) { console.error("Update error"); }
    }

    // עדכון כל 10 שניות לנתוני הטקסט
    updateIndicators();
    setInterval(updateIndicators, 10000);
</script>

</body>
</html>
